spring:
  application:
    name: automation-service

  config:
    import: "optional:configserver:http://localhost:8888"

  datasource:
    url: jdbc:mysql://localhost:3306/agms_automation_db?createDatabaseIfNotExist=true
    username: root
    password: 1234
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true

automation:
  thresholds:
    temperature: 30.0
    humidity: 40.0

logging:
  level:
    com.agms.automation_service: DEBUG

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/