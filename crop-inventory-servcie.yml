server:
  port: 8084  # service port

spring:
  datasource:
    url: jdbc:mysql://localhost:3306/agms_crop_db?createDatabaseIfNotExist=true  # DB URL
    username: root  # DB username
    password: mysql  # DB password
    driver-class-name: com.mysql.cj.jdbc.Driver  # MySQL driver

  jpa:
    hibernate:
      ddl-auto: update  # auto update tables
    show-sql: true  # show SQL queries
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect  # MySQL dialect

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/  # eureka server